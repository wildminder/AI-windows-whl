# This workflow belongs in the MAIN branch, not gh-pages branch.
# File location: .github/workflows/update-wheels.yml (in main branch)
#
# Purpose: When wheels.json is updated in main branch, copy it to gh-pages/docs/
# This allows data updates without rebuilding the entire site.

name: Update wheels.json on gh-pages

on:
  push:
    branches: [main]
    paths: ['wheels.json']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-wheels:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          sparse-checkout: wheels.json
          sparse-checkout-cone-mode: false

      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - name: Copy wheels.json to gh-pages/docs/
        run: cp wheels.json gh-pages/docs/wheels.json

      - name: Commit to gh-pages
        working-directory: gh-pages
        run: |
          git config user.name 'github-actions'
          git config user.email 'github-actions@github.com'
          git add docs/wheels.json
          git commit -m "Update wheels.json from main branch [$(date -u +%Y-%m-%d)]" || echo "No changes to commit"
          git push
