# Workflow for the MAIN branch
# This file should be copied to the main branch at .github/workflows/update-wheels.yml
#
# Purpose: When wheels.json is pushed to main branch:
# 1. Extract last_updated_utc timestamp from wheels.json
# 2. Create/update version.txt with Unix timestamp
# 3. Push both files to gh-pages/docs/ directory

name: Data Sync to Website

on:
  push:
    branches: [main]
    paths: ['wheels.json']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main branch content
        uses: actions/checkout@v4
        with:
          path: main-branch

      - name: Checkout gh-pages branch content
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages-branch

      - name: Prepare and Copy Data
        run: |
          # Calculate Version from main branch's wheels.json
          TIMESTAMP=$(jq -r '.last_updated_utc' main-branch/wheels.json)
          UNIX_TS=$(date -d "$TIMESTAMP" +%s 2>/dev/null || echo "$TIMESTAMP")
          
          # Copy to the docs folder inside the gh-pages checkout
          cp main-branch/wheels.json gh-pages-branch/docs/
          echo "$UNIX_TS" > gh-pages-branch/docs/version.txt

      - name: Commit to gh-pages branch
        working-directory: gh-pages-branch
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add docs/
          git diff --quiet && git diff --staged --quiet || (git commit -m "data: update wheels.json and version.txt" && git push)
