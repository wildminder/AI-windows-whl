name: Build Web App UI

on:
  push:
    branches: [gh-pages]
    paths:
      - 'web/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Build React App (cleans and outputs to docs/)
        working-directory: ./web
        run: |
          npm ci
          npm run build 

      - name: Generate version.txt from wheels.json
        run: |
          curl -L -o docs/wheels.json "https://raw.githubusercontent.com/${{ github.repository }}/main/wheels.json"
          
          TIMESTAMP=$(jq -r '.last_updated_utc' docs/wheels.json)
          UNIX_TS=$(date -d "$TIMESTAMP" +%s 2>/dev/null || echo "0")
          echo "$UNIX_TS" > docs/version.txt

      - name: Push Build to Branch
        run: |
          git config user.name 'github-actions'
          git config user.email 'github-actions@github.com'
          git add docs/
          git diff --quiet && git diff --staged --quiet || (git commit -m "build: update ui and sync data" && git push)
