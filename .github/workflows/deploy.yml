name: Build and Deploy

on:
  push:
    branches: [gh-pages]
    paths:
      - 'web/**'         
    paths-ignore:
      - 'docs/**' 
      - '.github/**' 
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install and Build
        working-directory: ./web
        run: |
          npm ci
          npm run build

      - name: Update docs folder
        run: |
          # Ensure latest data is included in the new build
          curl -L -o web/dist/wheels.json "https://raw.githubusercontent.com/${{ github.repository }}/main/wheels.json"
          curl -L -o web/dist/version.txt "https://raw.githubusercontent.com/${{ github.repository }}/main/version.txt" || true
          
          git config user.name 'github-actions'
          git config user.email 'github-actions@github.com'
          
          # Replace docs content with new build
          rm -rf docs/*
          cp -r web/dist/* docs/
          
          git add docs/
          git commit -m "Build: Update website UI" || echo "No changes"
          git push
